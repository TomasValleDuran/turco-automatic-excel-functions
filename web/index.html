<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Valores para Macro.xlsx</title>
<style>
  :root { --bg:#0f1116; --card:#191c24; --line:#2a2f3a; --txt:#e8eaf0;
          --muted:#9aa3b2; --accent:#4c8dff; --ok:#2ecc71; --err:#e74c3c; }
  * { box-sizing:border-box; }
  body { margin:0; font:16px/1.5 -apple-system,Segoe UI,Roboto,sans-serif;
         background:var(--bg); color:var(--txt); }
  .wrap { max-width:780px; margin:0 auto; padding:32px 20px 64px; }
  h1 { font-size:24px; margin:0 0 4px; }
  .sub { color:var(--muted); margin:0 0 28px; }
  h2 { font-size:14px; text-transform:uppercase; letter-spacing:.05em;
       color:var(--muted); margin:30px 0 12px; }
  .card { background:var(--card); border:1px solid var(--line);
          border-radius:14px; padding:16px 18px; margin-bottom:12px; }
  .top { display:flex; align-items:baseline; gap:10px; }
  .name { font-weight:600; font-size:17px; flex:1; }
  .date { color:var(--muted); font-size:13px; }
  .vals { display:flex; flex-wrap:wrap; gap:18px; margin:12px 0; }
  .val .k { color:var(--muted); font-size:12px; text-transform:uppercase; }
  .val .v { font-size:24px; font-weight:700; font-variant-numeric:tabular-nums; }
  .ipc-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(92px,1fr));
              gap:10px; margin:12px 0; }
  .ipc-grid .v { font-size:16px; font-weight:600; }
  button { cursor:pointer; border:none; border-radius:9px; padding:9px 14px;
           font-size:14px; font-weight:600; color:#fff; background:var(--accent); }
  button.alt { background:#3a3f4b; }
  button.copy { background:#2a3142; border:1px solid var(--line); }
  button.copy.done { background:var(--ok); color:#06240f; }
  button:disabled { opacity:.55; cursor:wait; }
  .err { color:var(--err); font-size:14px; }
  .hint { color:var(--muted); font-size:12px; margin-top:6px; }
  .barbtn { width:100%; padding:13px; margin-top:4px; }
  .skel { color:var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <h1>📋 Valores para Macro.xlsx</h1>
  <p class="sub">Tomá el último valor publicado y copialo directo a la planilla.
     El botón <b>Copiar</b> deja el dato listo para pegar en la fila correspondiente.</p>

  <h2>Diario · TC OFICIAL y MEP</h2>
  <div id="daily"><div class="card skel">Cargando…</div></div>

  <h2>Mensual · ARG IPC y USA CPI</h2>
  <div id="monthly"></div>
  <button id="loadMonthly" class="alt barbtn" onclick="loadMonthly()">
    Cargar valores mensuales (puede tardar ~10–30 s)</button>
</div>

<script>
function copy(text, btn){
  navigator.clipboard.writeText(text).then(()=>{
    const old=btn.textContent; btn.textContent="✓ Copiado"; btn.classList.add("done");
    setTimeout(()=>{btn.textContent=old; btn.classList.remove("done");},1500);
  });
}
function fmt(n){ return typeof n==="number" ? n.toLocaleString("es-AR",{maximumFractionDigits:4}) : n; }
function cbtn(text){ return `<button class="copy" onclick='copy(${JSON.stringify(text)}, this)'>Copiar</button>`; }

async function loadDaily(){
  const box=document.getElementById("daily");
  let d={}; try{ d=await (await fetch("/api/daily",{cache:"no-store"})).json(); }
  catch(e){ box.innerHTML='<div class="card err">No se pudo conectar.</div>'; return; }
  let html="";
  const o=d.oficial||{};
  if(o.error){ html+=`<div class="card"><div class="name">TC diario OFICIAL</div><div class="err">${o.error}</div></div>`; }
  else { html+=`<div class="card">
      <div class="top"><span class="name">TC diario OFICIAL</span><span class="date">${o.date}</span></div>
      <div class="vals">
        <div class="val"><div class="k">Compra</div><div class="v">${fmt(o.compra)}</div></div>
        <div class="val"><div class="k">Venta</div><div class="v">${fmt(o.venta)}</div></div>
      </div>
      ${cbtn(o.compra+"\t"+o.venta)}
      <div class="hint">Pega en las columnas Compra y Venta (dos celdas).</div>
    </div>`; }
  const m=d.mep||{};
  if(m.error){ html+=`<div class="card"><div class="name">TC diario MEP</div><div class="err">${m.error}</div></div>`; }
  else { html+=`<div class="card">
      <div class="top"><span class="name">TC diario MEP</span><span class="date">${m.date}</span></div>
      <div class="vals"><div class="val"><div class="k">Referencia</div><div class="v">${fmt(m.value)}</div></div></div>
      ${cbtn(String(m.value))}
    </div>`; }
  box.innerHTML=html;
}

async function loadMonthly(){
  const btn=document.getElementById("loadMonthly"); btn.disabled=true;
  const box=document.getElementById("monthly");
  box.innerHTML='<div class="card skel">Descargando datos del INDEC…</div>';
  let d={}; try{ d=await (await fetch("/api/monthly",{cache:"no-store"})).json(); }
  catch(e){ box.innerHTML='<div class="card err">No se pudo conectar (puede ser timeout del INDEC). Reintentá.</div>'; btn.disabled=false; return; }
  let html="";
  const c=d.cpi||{};
  if(c.error){ html+=`<div class="card"><div class="name">USA CPI</div><div class="err">${c.error}</div></div>`; }
  else { html+=`<div class="card">
      <div class="top"><span class="name">USA CPI</span><span class="date">${c.year}-${String(c.month).padStart(2,"0")}</span></div>
      <div class="vals"><div class="val"><div class="k">Índice</div><div class="v">${fmt(c.value)}</div></div></div>
      ${cbtn(String(c.value))}
      <div class="hint">Año ${c.year}, mes ${c.month} — pega en la celda correspondiente.</div>
    </div>`; }
  const i=d.ipc||{};
  if(i.error){ html+=`<div class="card"><div class="name">ARG IPC</div><div class="err">${i.error}</div></div>`; }
  else {
    const cells=i.columnas.map((col,idx)=>`<div class="val"><div class="k">${col}</div><div class="v">${fmt(i.valores[idx])}</div></div>`).join("");
    const rowTab=[i.periodo,...i.valores].join("\t");
    html+=`<div class="card">
      <div class="top"><span class="name">ARG IPC</span><span class="date">${i.periodo}</span></div>
      <div class="ipc-grid">${cells}</div>
      ${cbtn(rowTab)}
      <div class="hint">Copia la fila completa (Período + 7 regiones) y pégala en una fila nueva.</div>
    </div>`;
  }
  box.innerHTML=html; btn.disabled=false;
  btn.textContent="Recargar valores mensuales";
}

loadDaily();
</script>
</body>
</html>
